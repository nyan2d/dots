font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bolt_italic:
    family: JetBrainsMono Nerd Font
    style: Bolt Italic

  size: 11.0
  use_thin_strokes: true

  offset:
    y: 2

window:
  opacity: 1.0
  padding:
    x: 0
    y: 0
  dynamic_padding: true

mouse:
  hide_when_typing: true

selection:
  save_to_clipboard: true

colors:
  # Default colors
  primary:
    background: '0x202434'
    foreground: '0xFFFFFF'

  # Normal colors
  normal:
    black:   '0x10100E'
    red:     '0xC40233'
    green:   '0x009F6B'
    yellow:  '0xFFD700'
    blue:    '0x0087BD'
    magenta: '0x9A4EAE'
    cyan:    '0x20B2AA'
    white:   '0xC6C6C4'

  # Bright colors
  bright:
    black:   '0x696969'
    red:     '0xFF2400'
    green:   '0x03C03C'
    yellow:  '0xFDFF00'
    blue:    '0x007FFF'
    magenta: '0xFF1493'
    cyan:    '0x00CCCC'
    white:   '0xFFFAFA'
